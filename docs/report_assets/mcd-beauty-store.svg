<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="850" viewBox="0 0 1200 850">
  <defs>
    <style>
      .page { fill: #ffffff; }
      .entity { fill: #f8f8f8; stroke: #9a9a9a; stroke-width: 1.4; }
      .relation { fill: #ffffff; stroke: #a9a9a9; stroke-width: 1.2; }
      .title { font: 700 22px "Times New Roman", serif; fill: #111; }
      .subtitle { font: 14px "Times New Roman", serif; fill: #555; }
      .head { font: 700 16px "Times New Roman", serif; fill: #111; }
      .attr { font: 14px "Times New Roman", serif; fill: #222; }
      .line { stroke: #777; stroke-width: 1.2; fill: none; }
      .card { font: 700 13px "Times New Roman", serif; fill: #111; }
      .small { font: 12px "Times New Roman", serif; fill: #444; }
      .figure { font: 700 15px "Times New Roman", serif; fill: #2c62b7; }
      .caption { font: 14px "Times New Roman", serif; fill: #222; }
    </style>
  </defs>

